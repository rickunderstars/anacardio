<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="assets/images/heart-icon.png" type="image/png" />
		<title>heart-vis</title>
	</head>

	<body class="bg-slate-900 text-slate-100 antialiased font-sans">
		<div class="flex h-screen w-full overflow-hidden">
			<div id="viewport" class="bg-black relative"></div>

			<div
				class="flex-grow w-2/5 flex flex-col gap-6 p-4 bg-slate-800 overflow-y-auto"
			>
				<div class="flex gap-3 overflow-auto">
					<div
						class="flex flex-none w-1/2 items-center gap-2 text-4xl font-bold text-shadow-xl"
					>
						heart-vis
						<img
							src="assets/images/heart-icon.png"
							class="w-10 h-10 object-contain drop-shadow-xl"
						/>
					</div>

					<select
						id="add-mesh-dropdown"
						class="block w-1/3 p-2 bg-blue-600 text-center rounded-md cursor-pointer font-medium appearance-none focus:outline-none"
					></select>

					<div
						id="filename"
						class="block w-1/3 text-sm italic align-middle self-center"
					>
						No file selected
					</div>
				</div>

				<div class="flex gap-2">
					<input
						type="file"
						id="raw-mesh"
						accept="text/*"
						class="hidden"
					/>
					<label
						id="camera-reset"
						class="flex-1 p-2 bg-slate-700 hover:bg-slate-600 text-sm text-center rounded cursor-pointer transition-all border border-slate-600"
					>
						Camera Reset
					</label>
				</div>

				<div class="flex flex-grow gap-4">
					<div class="flex flex-col flex-grow gap-4">
						<div
							data-js="qualities-list"
							class="flex flex-col border border-slate-700 rounded-md overflow-hidden divide-y divide-slate-700 w-full"
						>
							<label class="cursor-pointer group">
								<input
									type="radio"
									name="quality"
									value="unipolar"
									class="sr-only peer"
									checked
								/>
								<div
									class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent transition-all peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
								>
									<div
										class="flex flex-row items-center w-full"
									>
										<div
											class="w-1/2 border-r border-slate-400 pr-4 text-left text-md font-medium truncate"
										>
											Unipolar
										</div>
										<div
											id="unipolar-value"
											class="pl-4 text-md font-medium truncate"
										>
											---
										</div>
									</div>
								</div>
							</label>

							<label class="cursor-pointer group">
								<input
									type="radio"
									name="quality"
									value="bipolar"
									class="sr-only peer"
								/>
								<div
									class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent transition-all peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
								>
									<div
										class="flex flex-row items-center w-full"
									>
										<div
											class="w-1/2 border-r border-slate-400 pr-4 text-left text-md font-medium truncate"
										>
											Bipolar
										</div>
										<div
											id="bipolar-value"
											class="pl-4 text-md font-medium truncate"
										>
											---
										</div>
									</div>
								</div>
							</label>

							<label class="cursor-pointer group">
								<input
									type="radio"
									name="quality"
									value="lat"
									class="sr-only peer"
								/>
								<div
									class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent transition-all peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
								>
									<div
										class="flex flex-row items-center w-full"
									>
										<div
											class="w-1/2 border-r border-slate-400 pr-4 text-left text-md font-medium truncate"
										>
											LAT
										</div>
										<div
											id="lat-value"
											class="pl-4 text-md font-medium truncate"
										>
											---
										</div>
									</div>
								</div>
							</label>

							<label class="cursor-pointer group">
								<input
									type="radio"
									name="quality"
									value="eml"
									class="sr-only peer"
								/>
								<div
									class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent transition-all peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
								>
									<div
										class="flex flex-row items-center w-full"
									>
										<div
											class="w-1/2 border-r border-slate-400 pr-4 text-left text-md font-medium truncate"
										>
											EML
										</div>
										<div
											id="eml-value"
											class="pl-4 text-md font-medium truncate"
										>
											---
										</div>
									</div>
								</div>
							</label>

							<label class="cursor-pointer group">
								<input
									type="radio"
									name="quality"
									value="exteml"
									class="sr-only peer"
								/>
								<div
									class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent transition-all peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
								>
									<div
										class="flex flex-row items-center w-full"
									>
										<div
											class="w-1/2 border-r border-slate-400 pr-4 text-left text-md font-medium truncate"
										>
											ExtEML
										</div>
										<div
											id="exteml-value"
											class="pl-4 text-md font-medium truncate"
										>
											---
										</div>
									</div>
								</div>
							</label>

							<label class="cursor-pointer group">
								<input
									type="radio"
									name="quality"
									value="scar"
									class="sr-only peer"
								/>
								<div
									class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent transition-all peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
								>
									<div
										class="flex flex-row items-center w-full"
									>
										<div
											class="w-1/2 border-r border-slate-400 pr-4 text-left text-md font-medium truncate"
										>
											SCAR
										</div>
										<div
											id="scar-value"
											class="pl-4 text-md font-medium truncate"
										>
											---
										</div>
									</div>
								</div>
							</label>

							<label class="cursor-pointer group">
								<input
									type="radio"
									name="quality"
									value="groupid"
									class="sr-only peer"
								/>
								<div
									class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent transition-all peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
								>
									<div
										class="flex flex-row items-center w-full"
									>
										<div
											class="w-1/2 border-r border-slate-400 pr-4 text-left text-md font-medium truncate"
										>
											GroupID
										</div>
										<div
											id="groupid-value"
											class="pl-4 text-md font-medium truncate"
										>
											---
										</div>
									</div>
								</div>
							</label>
						</div>

						<select
							id="loaded-meshes-dropdown"
							class="hidden block w-full p-2 bg-slate-700 hover:bg-slate-600 text-center rounded-md cursor-pointer transition-colors font-medium text-white appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 mt-auto"
						></select>
					</div>

					<div
						id="color-gauge"
						class="w-1/7 flex flex-col items-center"
					>
						<div
							id="max-value"
							class="text-sm text-center font-bold bg-black rounded-md w-full mb-1"
						>
							max<br />---
						</div>
						<div
							class="relative w-full h-full flex justify-center rounded"
						>
							<canvas
								id="gradient-bar"
								class="w-full h-full rounded-md box-shadow-xl"
							></canvas>
							<div
								id="gauge-line"
								class="absolute w-8/7 h-0.5 rounded border-y border-white pointer-events-none"
							></div>
						</div>
						<div
							id="min-value"
							class="text-sm text-center font-bold bg-black rounded-md w-full mt-1"
						>
							min<br />---
						</div>
					</div>
				</div>

				<div class="flex flex-col gap-4 pt-4 border-t border-slate-700">
					<div class="flex flex-row gap-3">
						<label
							id="color-ramp"
							class="block w-1/3 p-2 bg-blue-600 hover:bg-blue-500 text-center rounded-md cursor-pointer transition-colors font-medium"
						>
							Color Ramp
						</label>
						<label
							id="dynamic-animation"
							class="block w-1/3 p-2 bg-blue-600 hover:bg-blue-500 text-center rounded-md cursor-pointer transition-colors font-medium"
						>
							Dynamic Animation
						</label>
						<label
							id="tangent-field"
							class="block w-1/3 p-2 bg-blue-600 hover:bg-blue-500 text-center rounded-md cursor-pointer transition-colors font-medium"
						>
							Tangent Field
						</label>
					</div>
					<div class="flex flex-col gap-2">
						<div class="text-sm text-slate-500 font-bold">
							Lighting Intensity
						</div>
						<input
							type="range"
							min="20"
							max="100"
							value="60"
							id="light-slider"
							class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
						/>
					</div>
				</div>
			</div>
		</div>

		<script src="/js/emscripten/heart.out.js"></script>
		<script type="module" src="js/main.js"></script>
	</body>
</html>

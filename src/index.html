<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="assets/images/heart-icon.png" type="image/png" />
		<title>heart-vis</title>
	</head>

	<body
		class="bg-slate-900 text-white antialiased [&_*]:transition-all font-sans font-bold italic"
	>
		<div
			class="flex flex-col md:flex-row h-screen w-full overflow-hidden bg-slate-800"
		>
			<div
				id="viewport"
				class="relative shrink-0 w-full h-[50vh] md:w-4/7 md:h-full border-b-[0.2em] md:border-b-0 md:border-r-[0.2em] border-[whitesmoke] bg-[#080808] shadow-[0.3vh_0.3vh_1vh_rgba(0,0,0,0.3)]"
			></div>

			<div
				class="flex items-center justify-center text-sm font-bold bg-slate-800 text-slate-300 bg-slate-800"
			>
				<span
					id="vertical-gradient-title"
					class="inline-block -rotate-90 whitespace-nowrap w-8"
				>
					&LongLeftArrow; field &LongRightArrow;
				</span>
			</div>
			<div
				id="color-gauge"
				class="w-1/16 flex flex-col items-center bg-slate-800 py-2 px-0"
			>
				<div
					id="horizontal-gradient-title"
					class="text-sm text-center font-bold text-slate-300 mb-1 whitespace-nowrap hidden"
				>
					BIPOLAR<br />&longleftrightarrow;
				</div>

				<div class="flex flex-row w-full flex-grow gap-1 items-center">
					<div
						id="bipolar-min"
						class="w-1/5 min-w-[16px] flex-shrink-0 h-1/4 p-1 mr-1 bg-black rounded-md flex items-center justify-center hidden"
					>
						<span
							class="-rotate-90 whitespace-nowrap text-sm font-bold"
							>---</span
						>
					</div>

					<div class="flex flex-col flex-grow h-full min-w-0 gap-1">
						<div
							id="max-value"
							class="text-sm text-center font-bold bg-black rounded-md w-full p-1 truncate"
						>
							---
						</div>
						<div
							class="relative flex-grow w-full flex justify-center rounded"
						>
							<canvas
								id="gradient-bar"
								class="w-full h-full rounded-md box-shadow-xl"
							></canvas>
							<div
								id="gauge-line"
								class="absolute w-12/11 h-0.5 rounded border-y border-white pointer-events-none transform translate-y-1/2"
							></div>
						</div>
						<div
							id="min-value"
							class="text-sm text-center font-bold bg-black rounded-md w-full p-1 truncate"
						>
							---
						</div>
					</div>

					<div
						id="bipolar-max"
						class="w-1/5 min-w-[16px] flex-shrink-0 h-1/4 p-1 ml-1 bg-black rounded-md flex items-center justify-center hidden"
					>
						<span
							class="-rotate-90 whitespace-nowrap text-sm font-bold"
							>---</span
						>
					</div>
				</div>

				<div
					class="text-sm text-center font-bold bg-black rounded-md w-full mt-1 bg-slate-700 p-1"
				>
					<div id="sampler-value"></div>
				</div>
			</div>

			<div
				class="w-full h-[50vh] md:w-3/7 md:h-full flex flex-col gap-3 p-4 bg-slate-800 overflow-y-auto"
			>
				<div class="flex flex-wrap items-center gap-4 h-fit">
					<div
						class="flex flex-none items-center gap-2 text-4xl font-bold text-shadow-xl"
					>
						heart-vis
						<img
							src="assets/images/heart-icon.png"
							class="w-10 h-10 object-contain drop-shadow-xl"
						/>
					</div>

					<fieldset
						class="flex-grow flex items-center gap-4 border border-slate-500 rounded-lg p-2 min-w-[300px]"
					>
						<legend class="px-2 text-sm text-slate-300 font-bold">
							Model
						</legend>
						<select
							id="add-mesh-dropdown"
							class="flex-1 p-2 bg-blue-600 text-center rounded-md cursor-pointer font-medium appearance-none hover:bg-blue-500 focus:outline-none"
						></select>
					</fieldset>
				</div>

				<div class="flex flex-col gap-2">
					<input
						type="file"
						id="raw-mesh"
						accept="text/*"
						class="hidden"
					/>
					<fieldset class="border border-slate-500 rounded-lg p-2">
						<legend class="px-2 text-sm text-slate-300 font-bold">
							View
						</legend>
						<div class="grid grid-cols-3 gap-2">
							<button
								id="camera-front"
								class="p-2 bg-slate-700 hover:bg-slate-600 text-sm text-center rounded cursor-pointer border border-slate-600"
							>
								Front
							</button>
							<button
								id="camera-top"
								class="p-2 bg-slate-700 hover:bg-slate-600 text-sm text-center rounded cursor-pointer border border-slate-600"
							>
								Top
							</button>
							<button
								id="camera-left"
								class="p-2 bg-slate-700 hover:bg-slate-600 text-sm text-center rounded cursor-pointer border border-slate-600"
							>
								Left
							</button>
							<button
								id="camera-back"
								class="p-2 bg-slate-700 hover:bg-slate-600 text-sm text-center rounded cursor-pointer border border-slate-600"
							>
								Back
							</button>
							<button
								id="camera-bottom"
								class="p-2 bg-slate-700 hover:bg-slate-600 text-sm text-center rounded cursor-pointer border border-slate-600"
							>
								Bottom
							</button>
							<button
								id="camera-right"
								class="p-2 bg-slate-700 hover:bg-slate-600 text-sm text-center rounded cursor-pointer border border-slate-600"
							>
								Right
							</button>
						</div>
					</fieldset>
				</div>

				<div class="flex flex-grow gap-4">
					<div class="flex flex-col flex-grow gap-4">
						<div class="flex flex-row gap-4">
							<fieldset
								class="w-1/2 border border-slate-500 rounded-lg p-2"
							>
								<legend
									class="px-2 text-sm text-slate-300 font-bold"
								>
									Mode
								</legend>
								<div
									data-js="modes-list"
									class="flex flex-col border border-slate-700 rounded-md overflow-hidden divide-y divide-slate-700 w-full h-full"
								>
									<label
										class="flex-grow cursor-pointer group flex flex-col has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="mode"
											value="color-ramp"
											class="sr-only peer"
										/>
										<div
											class="flex-grow flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-center text-xl font-medium w-full"
											>
												Color Map
											</div>
										</div>
									</label>

									<label
										class="flex-grow cursor-pointer group flex flex-col has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="mode"
											value="animated"
											class="sr-only peer"
											checked
										/>
										<div
											class="flex-grow flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-center text-xl font-medium w-full"
											>
												Waves
											</div>
										</div>
									</label>

									<label
										class="flex-grow cursor-pointer group flex flex-col has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="mode"
											value="tangent-field"
											class="sr-only peer"
										/>
										<div
											class="flex-grow flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-center text-xl font-medium w-full"
											>
												Gradients
											</div>
										</div>
									</label>
								</div>
							</fieldset>

							<fieldset
								class="w-1/2 border border-slate-500 rounded-lg p-2"
							>
								<legend
									class="px-2 text-sm text-slate-300 font-bold"
								>
									Field
								</legend>
								<div
									data-js="qualities-list"
									class="flex flex-col border border-slate-700 rounded-md overflow-hidden divide-y divide-slate-700 w-full"
								>
									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="combined"
											class="sr-only peer"
											checked
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-black"
											>
												Combined
											</div>
										</div>
									</label>
									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="unipolar"
											class="sr-only peer"
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-medium"
											>
												Unipolar
											</div>
										</div>
									</label>

									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="bipolar"
											class="sr-only peer"
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-medium"
											>
												<span
													data-tick
													class="hidden text-blue-400 font-bold"
													>✓
												</span>
												Bipolar
											</div>
										</div>
									</label>

									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="lat"
											class="sr-only peer"
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-medium"
											>
												<span
													data-tick
													class="hidden text-blue-400 font-bold"
													>✓
												</span>
												LAT
											</div>
										</div>
									</label>

									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="eml"
											class="sr-only peer"
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-medium"
											>
												EML
											</div>
										</div>
									</label>

									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="exteml"
											class="sr-only peer"
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-medium"
											>
												<span
													data-tick
													class="hidden text-blue-400 font-bold"
													>✓
												</span>
												ExtEML
											</div>
										</div>
									</label>

									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="scar"
											class="sr-only peer"
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-medium"
											>
												SCAR
											</div>
										</div>
									</label>
									<label
										class="cursor-pointer group has-[:disabled]:cursor-not-allowed has-[:disabled]:opacity-50"
									>
										<input
											type="radio"
											name="quality"
											value="groupid"
											class="sr-only peer"
										/>
										<div
											class="flex items-center gap-3 px-4 py-1 bg-slate-800 border-l-2 border-transparent peer-checked:bg-blue-600/20 peer-checked:border-blue-500 group-hover:bg-slate-700"
										>
											<div
												class="px-4 text-left text-md font-medium"
											>
												GroupID
											</div>
										</div>
									</label>
								</div>
							</fieldset>
						</div>
						<fieldset
							class="border border-slate-500 rounded-lg p-2"
						>
							<!--
							<legend
							class="px-2 text-sm text-slate-300 font-bold"
							>
							Parameters
						</legend>
						-->
							<div class="flex flex-col gap-2">
								<div class="flex flex-row items-center">
									<div
										class="text-md text-slate-300 font-bold text-left w-1/3"
									>
										Shading
									</div>
									<input
										type="range"
										min="1"
										max="100"
										value="50"
										id="light-slider"
										class="w-full max-h-4 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
									/>
								</div>
								<div
									id="waves-number-container"
									class="flex flex-row items-center border-t border-slate-700 pt-2"
								>
									<div
										class="text-md text-slate-300 font-bold text-left w-1/3"
									>
										Waves Number
									</div>
									<input
										type="range"
										min="1"
										max="30"
										value="10"
										id="waves-number-slider"
										class="w-full max-h-4 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
									/>
								</div>

								<div
									id="waves-speed-container"
									class="flex flex-row items-center border-t border-slate-700 pt-2"
								>
									<div
										class="text-md text-slate-300 font-bold text-left w-1/3"
									>
										Waves Speed
									</div>
									<input
										type="range"
										min="1"
										max="30"
										value="5"
										id="waves-speed-slider"
										class="w-full max-h-4 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
									/>
								</div>
							</div>
						</fieldset>
					</div>
				</div>
			</div>
		</div>

		<script src="/js/emscripten/heart.out.js"></script>
		<script type="module" src="js/main.js"></script>
	</body>
</html>
